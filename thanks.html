<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約ありがとうございます｜il PhotoWedd（イルフォトウェディング）</title>
<meta name="description" content="il PhotoWeddへのご予約ありがとうございます。ご入力いただいた内容を確認のうえ、担当スタッフよりご連絡いたします。">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://ilphotowedding.photo-official.net/thanks.html">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%232E5BFF'/%3E%3Cpath d='M16 6c0 0 8 5 8 12 0 5-3.5 9-8 11-4.5-2-8-6-8-11 0-7 8-12 8-12z' fill='%23fff'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
</script>
</head>
<body>
<a href="#main" class="skip-link">本文へスキップ</a>

<header class="c-header">
  <div class="c-header__inner">
    <a href="index.html" class="c-header__logo" aria-label="il PhotoWedd ホームへ">
      <span class="c-header__logo-en u-en">il PhotoWedd</span>
      <span class="c-header__logo-ja">イルフォトウェディング</span>
    </a>
  </div>
</header>

<main id="main">
  <section class="c-thanks">
    <div class="l-container l-container--narrow">
      <svg class="c-thanks__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.4"/><path d="M8 12.5l2.5 2.5L16 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h1 class="c-thanks__title">ご予約ありがとうございます</h1>
      <p class="c-thanks__number u-en" id="thanks-number" aria-live="polite"></p>
      <p class="c-thanks__text">
        ご入力いただいた内容を確認のうえ、1〜2営業日以内に担当スタッフよりご連絡いたします。<br>
        ご入力いただいたメールアドレスに、受付内容の確認メールをお送りしました。<br>
        メールが届かない場合は、迷惑メールフォルダをご確認いただくか、LINEよりお問い合わせください。
      </p>
      <div class="c-thanks__buttons">
        <a href="https://lin.ee/gZPUh9s" class="c-btn c-btn--line" target="_blank" rel="noopener" data-gtag="line_click:thanks-line">LINEで相談する</a>
        <a href="index.html" class="c-btn c-btn--outline">トップページへ戻る</a>
      </div>
    </div>
  </section>
</main>

<footer class="c-footer">
  <div class="l-container">
    <div class="c-footer__bottom">
      <p class="c-footer__copy">&copy; 2026 il PhotoWedd / 株式会社小野写真館. All Rights Reserved.</p>
    </div>
  </div>
</footer>

<script>
  // 予約番号をURLパラメータから取得して表示し、GA4にreservation_completeを送信
  (function () {
    var params = new URLSearchParams(window.location.search);
    var no = params.get('no');
    var el = document.getElementById('thanks-number');
    if (no) {
      el.textContent = '予約番号：' + no;
    } else {
      el.remove();
    }
    if (typeof gtag === 'function') {
      gtag('event', 'reservation_complete', {
        event_category: 'Reservation',
        event_label: no || 'unknown'
      });
    }
  })();
</script>
</body>
</html>
